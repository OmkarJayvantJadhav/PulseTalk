services:
  # Backend API Service
  - type: web
    name: pulsetalk-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: ML_ENGINE_URL
        fromService:
          type: web
          name: pulsetalk-ml-engine
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        value: https://pulsetalk.vercel.app
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health

  # ML Engine Service
  - type: web
    name: pulsetalk-ml-engine
    env: python
    region: oregon
    plan: starter
    buildCommand: cd ml-engine && pip install -r requirements.txt
    startCommand: cd ml-engine && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DEBUG
        value: false
      - key: SENTIMENT_MODEL
        value: distilbert-base-uncased-finetuned-sst-2-english
      - key: EMOTION_MODEL
        value: j-hartmann/emotion-english-distilroberta-base
      - key: ALLOWED_ORIGINS
        value: https://pulsetalk-backend.onrender.com,https://pulsetalk.vercel.app
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
